name: Formula CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        # Pinned to a commit SHA (supply-chain hardening); bump deliberately.
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1 # master @ 2026-06-05
        continue-on-error: true

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap dirstral/tap "$GITHUB_WORKSPACE"
          # Homebrew now refuses to load formulae from non-official taps
          # unless they are explicitly trusted. Older runner images may not
          # have `brew trust` yet, so fall back to disabling the requirement
          # for the rest of the job on those images.
          if brew help trust >/dev/null 2>&1; then
            brew trust dirstral/tap
          else
            echo "HOMEBREW_NO_REQUIRE_TAP_TRUST=1" >> "$GITHUB_ENV"
          fi

      - name: Verify full-formula bootstrap invariant
        run: |
          grep -nE -- '-m".*"venv"|" -m ", "venv"|"-m", "venv"' Formula/dir2mcp-full.rb
          grep -n 'depends_on "expat"' Formula/dir2mcp-full.rb
          grep -n 'install_venv_pyexpat_shim!(python, venv_dir)' Formula/dir2mcp-full.rb
          if grep -nE -- 'system .*"venv".*uv|system .*uv.*"venv"|Formula\["uv"\].*"venv"|opt_bin/"uv".*"venv"' Formula/dir2mcp-full.rb; then
            echo "dir2mcp-full must not bootstrap its venv with uv"
            exit 1
          fi

      - name: Audit formula
        run: |
          brew audit --strict dirstral/tap/dir2mcp-full

  install-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            formula: dir2mcp
          - os: macos-14
            formula: dir2mcp
          - os: macos-14
            formula: dir2mcp-full
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        # Pinned to a commit SHA (supply-chain hardening); bump deliberately.
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1 # master @ 2026-06-05
        continue-on-error: true

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap dirstral/tap "$GITHUB_WORKSPACE"
          # Homebrew now refuses to load formulae from non-official taps
          # unless they are explicitly trusted. Older runner images may not
          # have `brew trust` yet, so fall back to disabling the requirement
          # for the rest of the job on those images.
          if brew help trust >/dev/null 2>&1; then
            brew trust dirstral/tap
          else
            echo "HOMEBREW_NO_REQUIRE_TAP_TRUST=1" >> "$GITHUB_ENV"
          fi

      - name: Install formula
        run: |
          brew install --formula "dirstral/tap/${{ matrix.formula }}"

      - name: Smoke version
        run: |
          dir2mcp version

      - name: Docling smoke (full only)
        if: matrix.formula == 'dir2mcp-full'
        run: |
          # --version imports torch/torchvision/transformers/cv2 (catches ABI &
          # dylib breaks) but NEVER loads the layout model, so it cannot catch an
          # out-of-date transformers (rt_detr_v2) or an empty-output break —
          # exactly how those shipped. Also convert a tiny fixture PDF so a
          # present-but-broken docling fails CI instead of shipping (dirstral/dir2mcp#372).
          DOCLING="$(brew --prefix)"/opt/dir2mcp-full/libexec/docling-venv/bin/docling
          "$DOCLING" --version
          out="$(mktemp -d)"
          # --device cpu: GitHub's headless macOS runners expose no usable GPU,
          # so torch's default MPS (Metal) backend reports 0 bytes and OOMs;
          # force CPU for the smoke. Real Macs keep the runtime default (auto).
          "$DOCLING" --to json --device cpu --output "$out" .github/fixtures/smoke.pdf
          json="$(find "$out" -name '*.json' -type f | head -1)"
          if [ -z "$json" ] || [ ! -s "$json" ]; then
            echo "::error::docling produced no/empty output for smoke.pdf"; exit 1
          fi
          echo "docling conversion smoke OK ($(wc -c < "$json") bytes)"
  install-linux:
    runs-on: ubuntu-latest
    # Homebrew's Linux build sandbox needs rootless Bubblewrap, which needs
    # unprivileged user namespaces. GitHub-hosted runners restrict those, so
    # the sandbox cannot start even with bubblewrap installed. Disable the
    # Linux sandbox in CI — we are only installing our own tap's formulae.
    env:
      HOMEBREW_NO_SANDBOX_LINUX: "1"
    strategy:
      fail-fast: false
      matrix:
        formula: [dir2mcp, dir2mcp-full]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        # Pinned to a commit SHA (supply-chain hardening); bump deliberately.
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1 # master @ 2026-06-05
        continue-on-error: true

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap dirstral/tap "$GITHUB_WORKSPACE"
          # Homebrew now refuses to load formulae from non-official taps
          # unless they are explicitly trusted. Older runner images may not
          # have `brew trust` yet, so fall back to disabling the requirement
          # for the rest of the job on those images.
          if brew help trust >/dev/null 2>&1; then
            brew trust dirstral/tap
          else
            echo "HOMEBREW_NO_REQUIRE_TAP_TRUST=1" >> "$GITHUB_ENV"
          fi

      - name: Install formula
        run: |
          brew install --formula "dirstral/tap/${{ matrix.formula }}"

      - name: Smoke version
        run: |
          dir2mcp version

      - name: Docling smoke (full only)
        if: matrix.formula == 'dir2mcp-full'
        run: |
          # --version imports rtree/libspatialindex/torch/transformers/cv2
          # (catches ABI/linkage breaks; the Linux post_install rpath fix,
          # homebrew-tap#22, is what makes the import pass) but never loads the
          # layout model. Convert a tiny fixture PDF too so an out-of-date
          # transformers (rt_detr_v2) or empty-output break fails CI (dirstral/dir2mcp#372).
          DOCLING="$(brew --prefix)"/opt/dir2mcp-full/libexec/docling-venv/bin/docling
          "$DOCLING" --version
          out="$(mktemp -d)"
          # --device cpu: GitHub's headless macOS runners expose no usable GPU,
          # so torch's default MPS (Metal) backend reports 0 bytes and OOMs;
          # force CPU for the smoke. Real Macs keep the runtime default (auto).
          "$DOCLING" --to json --device cpu --output "$out" .github/fixtures/smoke.pdf
          json="$(find "$out" -name '*.json' -type f | head -1)"
          if [ -z "$json" ] || [ ! -s "$json" ]; then
            echo "::error::docling produced no/empty output for smoke.pdf"; exit 1
          fi
          echo "docling conversion smoke OK ($(wc -c < "$json") bytes)"
