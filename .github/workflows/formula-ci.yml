name: Formula CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap dirstral/tap "file://$GITHUB_WORKSPACE"

      - name: Audit formula
        run: |
          brew audit --strict dirstral/tap/dir2mcp-full

  install-macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-14]
        formula: [dir2mcp, dir2mcp-full]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap dirstral/tap "file://$GITHUB_WORKSPACE"

      - name: Install formula
        run: |
          brew install --formula "dirstral/tap/${{ matrix.formula }}"

      - name: Smoke version
        run: |
          dir2mcp version

      - name: Docling smoke (full only)
        if: matrix.formula == 'dir2mcp-full'
        run: |
          command -v docling || true
          dir2mcp version

  install-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        formula: [dir2mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap dirstral/tap "file://$GITHUB_WORKSPACE"

      - name: Install formula
        run: |
          brew install --formula "dirstral/tap/${{ matrix.formula }}"

      - name: Smoke version
        run: |
          dir2mcp version
