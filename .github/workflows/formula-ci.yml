name: Formula CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        continue-on-error: true

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap --custom-remote dirstral/tap "$GITHUB_WORKSPACE"
          # Homebrew now refuses to load formulae from non-official taps
          # unless they are explicitly trusted. This is our own tap under
          # test, so trust it so audit/install can load the formulae.
          brew trust dirstral/tap

      - name: Verify full-formula bootstrap invariant
        run: |
          grep -nE -- '-m".*"venv"|" -m ", "venv"|"-m", "venv"' Formula/dir2mcp-full.rb
          if grep -nE -- 'system .*"venv".*uv|system .*uv.*"venv"|Formula\["uv"\].*"venv"|opt_bin/"uv".*"venv"' Formula/dir2mcp-full.rb; then
            echo "dir2mcp-full must not bootstrap its venv with uv"
            exit 1
          fi

      - name: Audit formula
        run: |
          brew audit --strict dirstral/tap/dir2mcp-full

  install-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            formula: dir2mcp
          - os: macos-14
            formula: dir2mcp
          - os: macos-14
            formula: dir2mcp-full
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        continue-on-error: true

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap --custom-remote dirstral/tap "$GITHUB_WORKSPACE"
          # Homebrew now refuses to load formulae from non-official taps
          # unless they are explicitly trusted. This is our own tap under
          # test, so trust it so audit/install can load the formulae.
          brew trust dirstral/tap

      - name: Install formula
        run: |
          brew install --formula "dirstral/tap/${{ matrix.formula }}"

      - name: Smoke version
        run: |
          dir2mcp version

      - name: Docling smoke (full only)
        if: matrix.formula == 'dir2mcp-full'
        run: |
          # Actually run docling (imports torch/torchvision/transformers), not
          # just check the file exists, so an ABI-broken venv fails CI.
          "$(brew --prefix)"/opt/dir2mcp-full/libexec/docling-venv/bin/docling --version
  install-linux:
    runs-on: ubuntu-latest
    # Homebrew's Linux build sandbox needs rootless Bubblewrap, which needs
    # unprivileged user namespaces. GitHub-hosted runners restrict those, so
    # the sandbox cannot start even with bubblewrap installed. Disable the
    # Linux sandbox in CI — we are only installing our own tap's formulae.
    env:
      HOMEBREW_NO_SANDBOX_LINUX: "1"
    strategy:
      fail-fast: false
      matrix:
        formula: [dir2mcp, dir2mcp-full]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        continue-on-error: true

      - name: Tap local checkout
        run: |
          brew untap dirstral/tap || true
          brew tap --custom-remote dirstral/tap "$GITHUB_WORKSPACE"
          # Homebrew now refuses to load formulae from non-official taps
          # unless they are explicitly trusted. This is our own tap under
          # test, so trust it so audit/install can load the formulae.
          brew trust dirstral/tap

      - name: Install formula
        run: |
          brew install --formula "dirstral/tap/${{ matrix.formula }}"

      - name: Smoke version
        run: |
          dir2mcp version

      - name: Docling smoke (full only)
        if: matrix.formula == 'dir2mcp-full'
        run: |
          # TODO(#22): run `docling --version` here too once the Linux
          # native-lib linkage is fixed (rtree/libspatialindex fails to load in
          # the relocated keg, the Linux analogue of the macOS torch fix). For
          # now only assert the binary exists; the dir2mcp functional check
          # detects a broken Linux venv at runtime and falls back to Mistral OCR.
          test -x "$(brew --prefix)"/opt/dir2mcp-full/libexec/docling-venv/bin/docling
